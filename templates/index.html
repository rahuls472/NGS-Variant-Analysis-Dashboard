<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GenomicInsight</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#eef4ff,#dbeafe);
            font-family:'Poppins',sans-serif;
            min-height:100vh;
        }

        .hero{
            padding:60px 0;
        }

        .hero h1{
            font-size:3rem;
            font-weight:700;
            color:#1e293b;
        }

        .hero p{
            color:#64748b;
            font-size:1.1rem;
        }

        .main-card{

            background:white;
            border:none;
            border-radius:25px;
            padding:40px;
            box-shadow:0 15px 35px rgba(0,0,0,.08);

        }

        .upload-box{

            border:2px dashed #cbd5e1;
            border-radius:20px;
            padding:35px;
            text-align:center;
            transition:.3s;

        }

        .upload-box:hover{

            border-color:#2563eb;
            background:#eff6ff;

        }

        .upload-box h5{

            margin-top:15px;
            font-weight:600;

        }

        input[type=file]{

            margin-top:15px;

        }

        .btn-run{

            background:#2563eb;
            border:none;
            border-radius:12px;
            padding:15px;
            font-size:18px;
            font-weight:600;

        }

        .btn-run:hover{

            background:#1d4ed8;

        }

        .feature-card{

            border:none;
            border-radius:20px;
            padding:25px;
            text-align:center;
            background:white;
            box-shadow:0 8px 20px rgba(0,0,0,.06);
            height:100%;

        }

        .feature-icon{

            font-size:45px;

        }

    </style>

</head>

<body>

<div class="container hero">

    <div class="text-center mb-5">

        <h1>🧬 GenomicInsight</h1>

        <p>
            End-to-End NGS Variant Calling & Analysis Platform
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="main-card">

                <form
                    action="{{ url_for('run_pipeline') }}"
                    method="POST"
                    enctype="multipart/form-data"
                >

                    <div class="mb-4">

                        <label class="form-label fw-bold">

                            Select Organism

                        </label>

                        <select
                            class="form-select form-select-lg"
                            name="organism"
                            required
                        >

                            <option value="">Choose Reference Genome</option>

                            <option value="ecoli">
                                Escherichia coli
                            </option>

                            <option value="sarscov2">
                                SARS-CoV-2
                            </option>

                        </select>

                    </div>

                    <div class="row g-4">

                        <div class="col-md-6">

                            <div class="upload-box">

                                <div class="feature-icon">
                                    📂
                                </div>

                                <h5>
                                    Upload FASTQ R1
                                </h5>

                                <input
                                    type="file"
                                    class="form-control"
                                    name="fastq1"
                                    required
                                >

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="upload-box">

                                <div class="feature-icon">
                                    📂
                                </div>

                                <h5>
                                    Upload FASTQ R2
                                </h5>

                                <input
                                    type="file"
                                    class="form-control"
                                    name="fastq2"
                                    required
                                >

                            </div>

                        </div>

                    </div>

                    <div class="d-grid mt-5">

                        <button
                            class="btn btn-primary btn-run"
                        >

                            🚀 Run Variant Calling Pipeline

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <div class="row mt-5 g-4">

        <div class="col-md-3">

            <div class="feature-card">

                <div class="feature-icon">
                    ✂️
                </div>

                <h5>FastP</h5>

                <small>
                    Quality Control & Trimming
                </small>

            </div>

        </div>

        <div class="col-md-3">

            <div class="feature-card">

                <div class="feature-icon">
                    🧬
                </div>

                <h5>BWA MEM</h5>

                <small>
                    Sequence Alignment
                </small>

            </div>

        </div>

        <div class="col-md-3">

            <div class="feature-card">

                <div class="feature-icon">
                    📦
                </div>

                <h5>SAMtools</h5>

                <small>
                    BAM Processing
                </small>

            </div>

        </div>

        <div class="col-md-3">

            <div class="feature-card">

                <div class="feature-icon">
                    🔬
                </div>

                <h5>GATK</h5>

                <small>
                    Variant Calling
                </small>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
